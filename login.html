<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroSense - Login</title>
    <!-- JavaScript Global Error Logger -->
    <script>
    window.onerror = function(message, source, lineno, colno, error) {
        var errorDiv = document.getElementById('global-error-box');
        if (!errorDiv) {
            errorDiv = document.createElement('div');
            errorDiv.id = 'global-error-box';
            errorDiv.style.position = 'fixed';
            errorDiv.style.top = '10px';
            errorDiv.style.left = '10px';
            errorDiv.style.right = '10px';
            errorDiv.style.background = '#f8d7da';
            errorDiv.style.color = '#721c24';
            errorDiv.style.border = '1px solid #f5c6cb';
            errorDiv.style.padding = '15px';
            errorDiv.style.borderRadius = '5px';
            errorDiv.style.zIndex = '99999999';
            errorDiv.style.fontSize = '14px';
            errorDiv.style.fontFamily = 'monospace';
            document.body.appendChild(errorDiv);
        }
        errorDiv.innerHTML += '<b>Error:</b> ' + message + ' at ' + source + ':' + lineno + '<br>';
        return false;
    };
    </script>
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;800&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0A1628;
            --bg-card: rgba(15, 32, 64, 0.65);
            --accent: #3DDC84;
            --accent-secondary: #5BC8AF;
            --text-primary: #E8F4F0;
            --text-subtle: #7A9E9A;
            --border-glow: rgba(61, 220, 132, 0.3);
            --font-heading: 'Montserrat', sans-serif;
            --font-body: 'Poppins', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ===== BACKGROUND CANVAS ===== */
        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== WATER RIPPLE OVERLAY ===== */
        .ripple-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background:
                radial-gradient(ellipse 600px 200px at 20% 80%, rgba(91, 200, 175, 0.06), transparent),
                radial-gradient(ellipse 500px 180px at 75% 90%, rgba(61, 220, 132, 0.05), transparent);
            animation: rippleShift 8s ease-in-out infinite alternate;
        }
        @keyframes rippleShift {
            0%   { opacity: 0.6; transform: translateY(0); }
            100% { opacity: 1;   transform: translateY(-8px); }
        }

        /* ===== LOGIN CARD ===== */
        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: var(--bg-card);
            backdrop-filter: blur(24px) saturate(140%);
            -webkit-backdrop-filter: blur(24px) saturate(140%);
            border: 1px solid rgba(61, 220, 132, 0.15);
            border-radius: 20px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.4),
                0 0 60px rgba(61, 220, 132, 0.07),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);

            /* Entrance animation */
            animation: cardEnter 0.6s ease-out both;
        }
        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ===== LOGO ===== */
        .logo-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        .logo-icon svg {
            width: 56px;
            height: 56px;
            filter: drop-shadow(0 0 12px rgba(61, 220, 132, 0.4));
        }

        .brand-name {
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 28px;
            letter-spacing: 3px;
            text-align: center;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .brand-subtitle {
            text-align: center;
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 12px;
            color: var(--text-subtle);
            margin-top: 4px;
            letter-spacing: 1.5px;
        }

        /* ===== STATUS BADGE ===== */
        .status-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin: 16px auto 0;
            font-size: 11px;
            color: var(--accent);
            font-family: var(--font-body);
            font-weight: 500;
            animation: badgePulse 2.4s ease-in-out infinite;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--accent);
        }
        @keyframes badgePulse {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.4; }
        }

        /* ===== FORM ===== */
        .form-group { margin-bottom: 20px; }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-subtle);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(10, 22, 40, 0.8);
            border: 1px solid rgba(122, 158, 154, 0.2);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-input::placeholder {
            color: rgba(122, 158, 154, 0.4);
        }
        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(61, 220, 132, 0.15), 0 0 20px rgba(61, 220, 132, 0.08);
        }

        /* ===== ERROR MESSAGE ===== */
        .error-msg {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            font-size: 12px;
            color: #f87171;
            margin-bottom: 16px;
        }
        .error-msg.visible { display: flex; }

        /* ===== BUTTON ===== */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #0A1628;
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 4px 20px rgba(61, 220, 132, 0.3);
        }
        .btn-login:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 30px rgba(61, 220, 132, 0.5), 0 0 40px rgba(61, 220, 132, 0.15);
        }
        .btn-login:active {
            transform: scale(0.98);
        }

        /* ===== DEMO CREDENTIALS ===== */
        .demo-hint {
            margin-top: 20px;
            text-align: center;
            font-size: 11px;
            color: var(--text-subtle);
            opacity: 0.6;
        }
        .demo-hint code {
            background: rgba(61, 220, 132, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--accent-secondary);
            font-family: 'DM Sans', monospace;
        }

        /* ===== FOOTER ===== */
        .login-footer {
            margin-top: 28px;
            padding-top: 16px;
            border-top: 1px solid rgba(122, 158, 154, 0.1);
            text-align: center;
            font-size: 10px;
            color: rgba(122, 158, 154, 0.5);
            letter-spacing: 0.5px;
        }

        /* ===== LOADING SCREEN ===== */
        .loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: var(--bg-primary);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .loading-overlay.active { display: flex; }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(61, 220, 132, 0.15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-family: var(--font-heading);
            font-size: 14px;
            letter-spacing: 3px;
            color: var(--accent);
        }

        /* ===== SHAKE ===== */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%  { transform: translateX(-8px); }
            40%  { transform: translateX(8px); }
            60%  { transform: translateX(-6px); }
            80%  { transform: translateX(6px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .login-card {
                margin: 16px;
                padding: 28px 24px;
            }
            .brand-name { font-size: 22px; }
        }
    </style>
</head>
<body>
    <!-- Background canvas for floating particles -->
    <canvas id="bg-canvas"></canvas>

    <!-- Water ripple overlay -->
    <div class="ripple-overlay"></div>

    <!-- Login Card -->
    <div class="login-card" id="login-card" style="position: relative; z-index: 9999999;">
        <!-- Logo -->
        <div class="logo-icon">
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Water drop -->
                <path d="M32 6 C32 6 14 28 14 40 C14 50 22 58 32 58 C42 58 50 50 50 40 C50 28 32 6 32 6Z"
                      fill="url(#dropGrad)" opacity="0.9"/>
                <!-- Signal waves -->
                <path d="M20 32 Q16 28 20 24" stroke="#5BC8AF" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
                <path d="M16 34 Q10 28 16 22" stroke="#5BC8AF" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.45"/>
                <path d="M44 32 Q48 28 44 24" stroke="#5BC8AF" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
                <path d="M48 34 Q54 28 48 22" stroke="#5BC8AF" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.45"/>
                <!-- Inner leaf vein -->
                <path d="M32 26 L32 46 M28 34 L32 30 L36 34" stroke="rgba(10,22,40,0.35)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                <defs>
                    <linearGradient id="dropGrad" x1="32" y1="6" x2="32" y2="58" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#3DDC84"/>
                        <stop offset="100%" stop-color="#5BC8AF"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>

        <!-- Brand -->
        <h1 class="brand-name">AGROSENSE</h1>
        <p class="brand-subtitle">Smart Irrigation Monitoring System</p>

        <!-- Status Badge -->
        <div class="status-badge" id="status-badge">
            <span class="status-dot"></span>
            <span id="status-text">Menghubungkan ke sistem...</span>
        </div>

        <!-- Login Form -->
        <form id="login-form" style="margin-top: 32px;" autocomplete="off">
            <div class="form-group">
                <label class="form-label" for="username">
                    <i class="fas fa-id-badge" style="margin-right: 4px;"></i> ID Pengguna
                </label>
                <input type="text" id="username" class="form-input" placeholder="Masukkan ID pengguna" autocomplete="username">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">
                    <i class="fas fa-lock" style="margin-right: 4px;"></i> Kata Sandi
                </label>
                <div style="position: relative;">
                    <input type="password" id="password" class="form-input" placeholder="********" autocomplete="current-password" style="padding-right: 40px;">
                    <button type="button" id="toggle-password" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: rgba(122, 158, 154, 0.7); cursor: pointer; padding: 4px; transition: color 0.2s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='rgba(122, 158, 154, 0.7)'" title="Tampilkan Kata Sandi">
                        <i class="fas fa-eye" id="toggle-password-icon"></i>
                    </button>
                </div>
            </div>

            <!-- Error Message -->
            <div class="error-msg" id="error-msg">
                <i class="fas fa-exclamation-circle"></i>
                <span id="error-text">ID Pengguna atau Kata Sandi salah.</span>
            </div>

            <button type="submit" class="btn-login">
                <i class="fas fa-arrow-right-to-bracket" style="margin-right: 8px;"></i>LOGIN
            </button>
        </form>



        <!-- Footer -->
        <div class="login-footer">
            AgroSense v2.1 Â· Sistem Monitoring Sawah Cerdas
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">MENGHUBUNGKAN KE SENSOR...</div>
    </div>

    <!-- Firebase SDK -->
    <script src="js/vendor/firebase-app.js"></script>
    <script src="js/vendor/firebase-auth.js"></script>
    <script src="js/vendor/firebase-database.js"></script>

    <!-- Shared Modules -->
    <script src="js/config.js?v=20260524"></script>
    <script src="js/security.js?v=20260524"></script>
    <script src="js/firebase-init.js?v=20260524"></script>

    <!-- Login Logic -->
    <script src="js/login.js?v=20260524"></script>
</body>
</html>
