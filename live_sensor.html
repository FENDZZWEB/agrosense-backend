<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroSense â€” Live Terminal Sensor</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;800&family=Poppins:wght@500&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .terminal-bg {
            background-color: #0d1117;
            font-family: 'Fira Code', monospace;
        }
        .terminal-text {
            color: #00ff41;
            text-shadow: 0 0 5px rgba(0, 255, 65, 0.3);
        }
        .terminal-line {
            animation: fadeIn 0.3s ease-in-out;
            border-bottom: 1px solid rgba(0, 255, 65, 0.1);
            padding-bottom: 0.5rem;
            margin-bottom: 0.5rem;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Custom scrollbar for terminal */
        .term-scroll::-webkit-scrollbar {
            width: 8px;
        }
        .term-scroll::-webkit-scrollbar-track {
            background: #0d1117; 
        }
        .term-scroll::-webkit-scrollbar-thumb {
            background: #00ff41; 
            border-radius: 4px;
        }
        .term-scroll::-webkit-scrollbar-thumb:hover {
            background: #00cc33; 
        }
    </style>
</head>
<body class="p-4 md:p-6 bg-gray-50 dark:bg-gray-900 transition-colors duration-300">
    <div class="container mx-auto max-w-5xl h-[90vh] flex flex-col">
        <!-- Header -->
        <header class="p-4 md:p-6 mb-4 relative z-50 rounded-xl shadow-lg border border-green-800/30 text-white bg-gradient-to-r from-gray-800 to-gray-900 flex justify-between items-center">
            <div class="flex items-center gap-3 md:gap-4">
                <a href="index.html" class="bg-white/10 hover:bg-white/20 p-2.5 rounded-lg transition-colors border border-white/10" title="Kembali ke Dashboard">
                    <i class="fas fa-arrow-left text-lg"></i>
                </a>
                <div class="bg-white/10 p-2.5 rounded-xl border border-white/10">
                    <i class="fas fa-terminal text-xl text-green-400"></i>
                </div>
                <div>
                    <h1 class="text-lg md:text-xl font-bold" style="font-family: 'Montserrat', sans-serif;">Live Sensor Terminal</h1>
                    <p class="text-xs text-gray-400 font-mono">Memantau data mentah dari ESP32_001</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div id="connection-status" class="px-3 py-1 rounded-full text-xs font-bold bg-yellow-500/20 text-yellow-400 border border-yellow-500/30 flex items-center">
                    <i class="fas fa-circle-notch fa-spin mr-2"></i> MENGHUBUNGKAN
                </div>
                <button id="btn-clear" class="bg-red-500/20 hover:bg-red-500/30 text-red-400 px-3 py-1.5 rounded-lg text-sm font-bold border border-red-500/30 transition-colors">
                    <i class="fas fa-trash-alt mr-1"></i> Bersihkan
                </button>
            </div>
        </header>

        <!-- Terminal Window -->
        <div class="terminal-bg rounded-xl shadow-2xl border border-gray-700 flex-1 overflow-hidden flex flex-col relative">
            <!-- Mac style top bar -->
            <div class="bg-gray-800 px-4 py-2 flex items-center border-b border-gray-700">
                <div class="flex space-x-2">
                    <div class="w-3 h-3 rounded-full bg-red-500"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500"></div>
                </div>
                <div class="mx-auto text-xs font-mono text-gray-400">root@agrosense:~/live-monitor</div>
            </div>
            
            <!-- Logs Area -->
            <div id="terminal-output" class="p-4 md:p-6 overflow-y-auto term-scroll flex-1 font-mono text-xs md:text-sm">
                <div class="text-gray-400 mb-4">
                    AgroSense Web Terminal v1.0<br>
                    Establishing secure WebSocket connection to Firebase...<br>
                    Connected. Listening for /sensor_data/esp32_001 changes...
                </div>
            </div>
            
            <!-- Terminal Input Line (Fake) -->
            <div class="bg-gray-800/50 px-4 py-3 border-t border-gray-800 flex items-center text-sm font-mono text-gray-400">
                <span class="text-green-500 mr-2">âžœ</span>
                <span class="text-blue-400 mr-2">~</span>
                <span class="animate-pulse">_</span>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="js/vendor/firebase-app.js"></script>
    <script src="js/vendor/firebase-auth.js"></script>
    <script src="js/vendor/firebase-database.js"></script>

    <!-- Shared Modules -->
    <script src="js/config.js?v=20260524"></script>
    <script src="js/security.js?v=20260524"></script>
    <script src="js/auth.js?v=20260524"></script>
    <script src="js/firebase-init.js?v=20260524"></script>

    <!-- Live Sensor Logic -->
    <script src="js/live-sensor.js?v=20260524"></script>
</body>
</html>
