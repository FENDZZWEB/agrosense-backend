name: Daily LSTM Irrigation Prediction

on:
  schedule:
    # Setiap hari jam 06:00 WIB = 22:00 UTC (malam sebelumnya)
    - cron: '0 22 * * *'
  workflow_dispatch:
    # Tombol "Run workflow" manual dari GitHub jika dibutuhkan

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: 📦 Install Dependencies
        run: pip install -r backend/requirements.txt

      - name: 🔑 Buat serviceAccountKey.json dari Secret
        run: echo '${{ secrets.FIREBASE_CREDENTIALS }}' > backend/serviceAccountKey.json

      - name: 🤖 Jalankan Prediksi LSTM
        env:
          AW_API_KEY: ${{ secrets.AW_API_KEY }}
          AW_LOCATION_KEY: ${{ secrets.AW_LOCATION_KEY }}
          RUN_MODE: once
          TF_CPP_MIN_LOG_LEVEL: '3'
        run: |
          cd backend
          python lstm_engine.py

      - name: 🧹 Hapus serviceAccountKey.json
        if: always()
        run: rm -f backend/serviceAccountKey.json
